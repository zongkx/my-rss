name: Multi-RSS to GitHub Issues

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  rss-task:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # 💡 这里去掉了 cache 配置，不再依赖 package-lock.json

      - name: Install Dependencies
        # 💡 确保这里是 npm install，而不是 npm ci
        run: npm install 

      - name: Fetch and Filter RSS
        run: node fetch_rss.js

      - name: Create Issues and Commit Cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -d "pending_posts" ]; then
            # 兼容 0-9 和 10-99 张贴单
            for meta_file in pending_posts/[0-9].md pending_posts/[0-9][0-9].md; do
              [ -e "$meta_file" ] || continue
              
              title=$(jq -r '.title' "$meta_file")
              body_file="pending_posts/$(jq -r '.bodyFile' "$meta_file")"
              
              echo "正在创建 Issue: $title"
              gh issue create --title "$title" --body-file "$body_file" --label "rss,automated"
            done
            
            rm -rf pending_posts
            
            # 将更新后的 cache.json 提交回仓库
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add cache.json
            git commit -m "chore: update rss cache [skip ci]" || echo "No changes to commit"
            git push || echo "No changes to push"
          fi
