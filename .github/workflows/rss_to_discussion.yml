name: Multi-RSS to GitHub Discussions

on:
  schedule:
    - cron: '0 */23 * * *'
  workflow_dispatch:

jobs:
  rss-task:
    runs-on: ubuntu-latest
    permissions:
      discussions: write # 必须
      contents: write    # 必须

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install 

      - name: Fetch and Filter RSS
        run: node fetch_rss.js

      - name: Create Discussions and Commit Cache
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 【新配置】设置需要保留的天数，超过这个天数的旧讨论会被自动清理
          DAYS_TO_KEEP: 7
        run: |
          if [ -d "pending_posts" ]; then
            # 1. 动态获取当前仓库的 Repository ID 和 "General" 分类的 ID
            echo "正在获取仓库和讨论分类数据..."
            repo_data=$(gh api graphql -f query='
              query($owner:String!, $name:String!) {
                repository(owner:$owner, name:$name) {
                  id
                  discussionCategories(first:10) {
                    nodes { id name }
                  }
                }
              }' -F owner="${{ github.repository_owner }}" -F name="${{ github.event.repository.name }}")

            REPO_ID=$(echo "$repo_data" | jq -r '.data.repository.id')
            # 默认去匹配名字叫 "General" 的分类 ID，如果你想改分类，把下面的 General 换掉即可
            CATEGORY_ID=$(echo "$repo_data" | jq -r '.data.repository.discussionCategories.nodes[] | select(.name=="General") | .id')

            if [ -z "$CATEGORY_ID" ] || [ "$CATEGORY_ID" = "null" ]; then
              echo "错误：未能在仓库中找到名为 'General' 的 Discussion 分类，请先确认开启了 Discussions 功能！"
              exit 1
            fi

            # ==========================================
            # 【新加入的清理逻辑】
            # ==========================================
            echo "开始检查并清理超过 $DAYS_TO_KEEP 天的旧讨论..."
            CUTOFF_DATE=$(date -u -d "$DAYS_TO_KEEP days ago" +"%Y-%m-%dT%H:%M:%SZ")
            echo "截止时间为: $CUTOFF_DATE"

            HAS_NEXT_PAGE=true
            END_CURSOR="null"

            while [ "$HAS_NEXT_PAGE" = "true" ]; do
              if [ "$END_CURSOR" = "null" ]; then
                cursor_param=""
              else
                cursor_param=", after: \"$END_CURSOR\""
              fi

              # 分页查询当前仓库里的讨论
              list_data=$(gh api graphql -f query='
                query($owner:String!, $name:String!) {
                  repository(owner:$owner, name:$name) {
                    discussions(first:100'"$cursor_param"', orderBy: {field: CREATED_AT, direction: DESC}) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        id
                        title
                        createdAt
                        category { name }
                      }
                    }
                  }
                }' -F owner="${{ github.repository_owner }}" -F name="${{ github.event.repository.name }}")

              HAS_NEXT_PAGE=$(echo "$list_data" | jq -r '.data.repository.discussions.pageInfo.hasNextPage')
              END_CURSOR=$(echo "$list_data" | jq -r '.data.repository.discussions.pageInfo.endCursor')

              # 筛选出属于 General 分类且早于截止时间的旧数据
              old_discussions=$(echo "$list_data" | jq -c '.data.repository.discussions.nodes[] | select(.category.name=="General")')

              if [ -n "$old_discussions" ]; then
                echo "$old_discussions" | while read -r row; do
                  disc_id=$(echo "$row" | jq -r '.id')
                  disc_title=$(echo "$row" | jq -r '.title')
                  disc_created=$(echo "$row" | jq -r '.createdAt')

                  if [[ "$disc_created" < "$CUTOFF_DATE" ]]; then
                    echo "发现过期讨论: [$disc_title] ($disc_created)，正在删除..."
                    gh api graphql -F id="$disc_id" -f query='
                      mutation($id:ID!) {
                        deleteDiscussion(input: {id: $id}) { clientMutationId }
                      }' > /dev/null
                    sleep 0.5 # 避免触发频控
                  fi
                done
              fi
            done
            echo "历史旧讨论清理完成。"
            # ==========================================
            # 【清理逻辑结束】
            # ==========================================


            # 2. 遍历临时文件，通过 GraphQL 创建 Discussion
            for meta_file in pending_posts/[0-9].md pending_posts/[0-9][0-9].md; do
              [ -e "$meta_file" ] || continue
              
              title=$(jq -r '.title' "$meta_file")
              body_file="pending_posts/$(jq -r '.bodyFile' "$meta_file")"
              
              echo "正在创建 Discussion: $title"
              
              # 通过 gh api graphql 强行注入
              gh api graphql -F repositoryId="$REPO_ID" -F categoryId="$CATEGORY_ID" -F title="$title" -F body="$(cat "$body_file")" -f query='
                mutation($repositoryId:ID!, $categoryId:ID!, $title:String!, $body:String!) {
                  createDiscussion(input: {repositoryId: $repositoryId, categoryId: $categoryId, title: $title, body: $body}) {
                    discussion { url }
                  }
                }' > /dev/null
            done
            
            rm -rf pending_posts
            
            # 将更新后的 cache.json 提交回仓库
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add cache.json
            git commit -m "chore: update rss cache [skip ci]" || echo "No changes to commit"
            git push || echo "No changes to push"
          fi
